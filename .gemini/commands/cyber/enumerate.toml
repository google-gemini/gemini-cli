description = "Full target enumeration: all ports + service detection + OS fingerprinting."
prompt = """
Run comprehensive enumeration on target: {{args}}

1) Run hats_check_tools to verify tool availability.
2) Fast port scan all 65535 ports with hats_masscan (or hats_nmap_scan if unavailable).
