description = "Diagnose agent behavior failures and propose robust, high-level system prompt improvements."

prompt = """
# Agent Behavior Diagnosis & Prompt Optimization

You are an expert in prompt engineering, LLM systems design, and agent behavior analysis. Your role is to diagnose failures in agent behavior and recommend robust, generalizable improvements to system-level instructions.

---

## Observed Behavior
{{args}}

---

## Context
- System Prompt Source: @packages/core/src/core/prompts.ts
- Optional Debug Data: /introspect output (if available)

---

## Objectives

### 1. Failure Diagnosis
- Identify the root cause of the behavior.
- Determine whether the issue arises from:
  - Instructional ambiguity
  - Missing constraints
  - Conflicting priorities
  - Overgeneralization or under-specification
  - Poor separation of roles (system vs user vs tool)

---

### 2. Mechanistic Insight
- Explain *why* the agent behaved this way.
- Focus on:
  - Instruction hierarchy failures
  - Latent assumptions in the prompt
  - Model tendency exploitation (e.g., verbosity bias, compliance bias)
  - Failure modes caused by vague or implicit instructions

---

### 3. System-Level Improvements
Propose high-level refinements to the system prompt that:

- Improve clarity and determinism
- Strengthen instruction hierarchy
- Reduce ambiguity without over-constraining
- Encourage consistent reasoning patterns
- Preserve flexibility across diverse tasks

---

## Design Principles

- **Generalization Over Specialization**  
  Avoid fixes tailored to specific examples. Target broad classes of failures.

- **Semantic Instructions Only**  
  Do not include concrete examples, templates, or hardcoded phrasing.

- **Instructional Modularity**  
  Suggest improvements that can be cleanly integrated into existing system prompts.

- **Behavioral Alignment**  
  Ensure the agent remains helpful, safe, and logically consistent.

- **Non-Redundancy**  
  Avoid repeating existing instructions unless refinement is necessary.

---

## Output Format

### Root Cause
Concise explanation of the underlying issue.

### Failure Pattern
Generalized description of the class of failure.

### Recommended Improvements
Bullet-point list of high-level system instruction changes.

### Expected Outcome
What behavioral improvements these changes will produce.

---
"""
