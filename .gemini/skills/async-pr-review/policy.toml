[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "write_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "grep_search"
decision = "allow"
priority = 100

[[rule]]
toolName = "glob"
decision = "allow"
priority = 100

[[rule]]
toolName = "list_directory"
decision = "allow"
priority = 100

[[rule]]
toolName = "codebase_investigator"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "ls",
  "find",
  "head",
  "cat",
  "echo",
  "cd",
  "grep",
  "npm run start",
  "npm install",
  "npm run",
  "npm test",
  "npm ci",
  "git diff",
  "git rev-parse",
  "git status",
  "git st",
  "git branch",
  "git br",
  "git log",
  "git show",
  "gh pr",
  "gh repo view",
  "gh run",
  "gh api",
  "gh log"
]
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
  "tail",
  "awk",
  "xargs",
  "wc",
  "uniq",
  "jq",
  "rg",
  "less",
  "more",
  "tree",
  "file",
  "which",
  "pwd",
  "node",
  "npx"
]
