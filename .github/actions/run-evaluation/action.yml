name: 'Run Evaluation'
description: 'Runs the SWE-bench evaluation in a container and checks against thresholds.'

inputs:
  branch-or-commit:
    description: 'The branch or commit to run the evaluation on.'
    required: true
  github-token:
    description: 'The GitHub token for authentication.'
    required: true
  gcp-wif-provider:
    description: 'The GCP Workload Identity Federation provider.'
    required: true
  gcp-project-id:
    description: 'The GCP project ID.'
    required: true
  service-account-email:
    description: 'The email of the GCP service account.'
    required: true
  eval-gemini-api-key:
    description: 'The Gemini API key for running the evaluation.'
    required: true
  eval-gcs-bucket:
    description: 'The GCS bucket for storing evaluation artifacts.'
    required: true
  resolution-rate-threshold:
    description: 'The threshold for the resolution rate.'
    required: false
    default: '90'
  tool-success-rate-threshold:
    description: 'The threshold for the tool success rate.'
    required: false
    default: '80'
  working-directory:
    description: 'The working directory containing the checkout.'
    required: false
    default: '.'

outputs:
  resolution-rate:
    description: "The calculated resolution rate."
    value: ${{ steps.calculate-rates.outputs.resolution-rate }}
  tool-success-rate:
    description: "The calculated tool success rate."
    value: ${{ steps.calculate-rates.outputs.tool-success-rate }}

runs:
  using: 'composite'
  steps:
    - name: 'Authenticate to Google Cloud'
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        project_id: '${{ inputs.gcp-project-id }}'
        workload_identity_provider: '${{ inputs.gcp-wif-provider }}'
        service_account: '${{ inputs.service-account-email }}'
        token_format: 'access_token'
        access_token_scopes: 'https://www.googleapis.com/auth/cloud-platform'
        create_credentials_file: true

    - name: 'Log in to GitHub Container Registry'
      uses: 'docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1' # ratchet:docker/login-action@v3
      with:
        registry: 'ghcr.io'
        username: '${{ github.actor }}'
        password: '${{ inputs.github-token }}'

    - name: 'Run evaluation'
      shell: 'bash'
      env:
        IMG: 'ghcr.io/google-gemini/gemini-cli-swe-agent-eval@sha256:cd5edc4afd2245c1f575e791c0859b3c084a86bb3bd9a6762296da5162b35a8f'
      run: |
        # Prepare directories for mounting
        HOST_WORKDIR=$(readlink -f "${{ inputs.working-directory }}")
        mkdir -p "$HOST_WORKDIR/experiments"

        # Create a temp file for GITHUB_OUTPUT inside container
        touch "$HOST_WORKDIR/container_github_output"

        # Run container
        docker run --rm \
          --workdir /app \
          --entrypoint /bin/bash \
          -v "$HOST_WORKDIR/experiments:/app/experiments" \
          -v "$HOST_WORKDIR:/github/workspace" \
          -v "${{ steps.auth.outputs.credentials_file_path }}:/gcp/creds.json" \
          -v "$HOST_WORKDIR/container_github_output:/tmp/github_output" \
          -e GITHUB_TOKEN='${{ inputs.github-token }}' \
          -e DEFAULT_VERTEXAI_PROJECT='${{ inputs.gcp-project-id }}' \
          -e GOOGLE_CLOUD_PROJECT='${{ inputs.gcp-project-id }}' \
          -e GOOGLE_APPLICATION_CREDENTIALS='/gcp/creds.json' \
          -e GEMINI_API_KEY='${{ inputs.eval-gemini-api-key }}' \
          -e GCLI_LOCAL_FILE_TELEMETRY='True' \
          -e EVAL_GCS_BUCKET='${{ inputs.eval-gcs-bucket }}' \
          -e GITHUB_WORKSPACE='/github/workspace' \
          -e GITHUB_OUTPUT='/tmp/github_output' \
          $IMG \
          -c "
            set -e
            cd /github/workspace
            git clean -fdx
            git reset --hard HEAD
            cd /app
            poetry run exp_run --experiment-mode=on-demand --branch-or-commit=${{ inputs.branch-or-commit }} --model-name=gemini-2.5-pro --dataset=swebench_verified --concurrency=15
            poetry run python agent_prototypes/scripts/parse_gcli_logs_experiment.py --experiment_dir=experiments/adhoc/gcli_temp_exp --gcs-bucket='${{ inputs.eval-gcs-bucket }}' --gcs-path=gh_action_artifacts
            poetry run bash /github/workspace/scripts/calculate_eval_success_rates.sh /app/experiments/adhoc/gcli_temp_exp/artifacts/summary_stats.md
          "

    - name: 'Read outputs and cleanup'
      id: 'calculate-rates'
      shell: 'bash'
      run: |
        HOST_WORKDIR=$(readlink -f "${{ inputs.working-directory }}")
        
        # Read outputs from container
        if [ -f "$HOST_WORKDIR/container_github_output" ]; then
          cat "$HOST_WORKDIR/container_github_output" >> "$GITHUB_OUTPUT"
          rm "$HOST_WORKDIR/container_github_output"
        fi

        # Fix ownership of generated files
        sudo chown -R "$(whoami)":"$(whoami)" "$HOST_WORKDIR/experiments"

    - name: 'Check evaluation thresholds'
      shell: 'bash'
      run: |
        resolution_rate=${{ steps.calculate-rates.outputs.resolution-rate }}
        tool_success_rate=${{ steps.calculate-rates.outputs.tool-success-rate }}
        resolution_threshold=${{ inputs.resolution-rate-threshold }}
        tool_threshold=${{ inputs.tool-success-rate-threshold }}

        echo "Resolution Rate: ${resolution_rate}% (Threshold: ${resolution_threshold}%)"
        echo "Tool Success Rate: ${tool_success_rate}% (Threshold: ${tool_threshold}%)"

        # Use bc for floating point comparison
        if (( $(echo "$resolution_rate < $resolution_threshold" | bc -l) )) || (( $(echo "$tool_success_rate < $tool_threshold" | bc -l) )); then
          echo "Error: Evaluation failed to meet required thresholds."
          exit 1
        else
          echo "Evaluation meets or exceeds thresholds."
        fi
