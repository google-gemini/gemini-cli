      - name: 'Setup Gemini'
        uses: './.github/actions/setup-gemini'
        with:
          mode: 'source'
          skip-npm-ci: 'true'

      - name: 'Run UI Components Top Tests'
        run: 'npx vitest run --pool=threads packages/cli/src/ui/components/*.test.tsx'
        shell: 'bash'

  test_batch_1:
    name: 'cli:utils'
    runs-on: 'gemini-cli-ubuntu-16-core'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020'
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci --ignore-scripts'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Setup Gemini'
        uses: './.github/actions/setup-gemini'
        with:
          mode: 'source'
          skip-npm-ci: 'true'

      - name: 'Run Batch 1 Tests'
        run: 'npx vitest run --pool=threads packages/cli/src/test-utils packages/cli/src/utils'
        shell: 'bash'

  test_batch_2:
    name: 'cli:core-services'
    runs-on: 'gemini-cli-ubuntu-16-core'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020'
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci --ignore-scripts'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Setup Gemini'
        uses: './.github/actions/setup-gemini'
        with:
          mode: 'source'
          skip-npm-ci: 'true'

      - name: 'Run Batch 2 Tests'
        run: 'npx vitest run --pool=threads packages/cli/src/core packages/cli/src/services packages/cli/src/acp'
        shell: 'bash'

  test_batch_3:
    name: 'cli:commands-config'
    runs-on: 'gemini-cli-ubuntu-16-core'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020'
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci --ignore-scripts'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Setup Gemini'
        uses: './.github/actions/setup-gemini'
        with:
          mode: 'source'
          skip-npm-ci: 'true'

      - name: 'Run Batch 3 Tests'
        run: 'npx vitest run --pool=threads packages/cli/src/commands packages/cli/src/config'
        shell: 'bash'

  test_core:
    name: 'core'
    runs-on: 'gemini-cli-ubuntu-16-core'
    env:
      GEMINI_SANDBOX: 'false'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020'
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci --ignore-scripts'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Setup Gemini'
        uses: './.github/actions/setup-gemini'
        with:
          mode: 'source'
          skip-npm-ci: 'true'

      - name: 'Run All Core Tests'
        run: 'npx vitest run --pool=threads packages/core/src --exclude "**/*.integration.test.ts"'
        shell: 'bash'

  test_e2e:
    name: 'e2e:linux'
    runs-on: 'gemini-cli-ubuntu-16-core'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020'
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci --ignore-scripts'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Build Bundle'
        run: 'npm run bundle'

      - name: 'Run Integration Tests'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          KEEP_OUTPUT: 'true'
          VERBOSE: 'true'
        run: 'npm run test:integration:sandbox:none'
        shell: 'bash'

  test_e2e_mac:
    name: 'e2e:mac'
    runs-on: 'macos-latest-large'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'

      - name: 'Set up Node.js'
