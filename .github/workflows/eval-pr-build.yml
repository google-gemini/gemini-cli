name: 'Evals: PR Build (Untrusted Code)'

on:
  pull_request:
    types: ['opened', 'synchronize', 'reopened', 'ready_for_review']
    paths:
      - 'packages/core/src/prompts/**'
      - 'packages/core/src/tools/**'
      - 'packages/core/src/agents/**'
      - 'evals/**'
      - '!**/*.test.ts'
      - '!**/*.test.tsx'

# pull_request from forks uses a read-only token with NO access to repository secrets.
# This is intentional: fork code (npm lifecycle hooks, build scripts) runs here
# and must never have access to GEMINI_API_KEY or GITHUB_TOKEN write permissions.
permissions:
  contents: read

concurrency:
  group: 'eval-build-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  detect-and-build:
    name: 'Detect Changes & Build Fork Code'
    runs-on: 'gemini-cli-ubuntu-16-core'
    if: "github.repository == 'google-gemini/gemini-cli' && github.event.pull_request.draft == false"
    outputs:
      SHOULD_RUN: '${{ steps.detect.outputs.SHOULD_RUN }}'
      STEERING_DETECTED: '${{ steps.detect.outputs.STEERING_DETECTED }}'
    steps:
      - name: 'Checkout main (trusted)'
        uses: 'actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955' # ratchet:actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 'Detect Steering Changes'
        id: 'detect'
        env:
          PR_HEAD_SHA: '${{ github.event.pull_request.head.sha }}'
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head
          SHOULD_RUN=$(node scripts/changed_prompt.js)
          STEERING_DETECTED=$(node scripts/changed_prompt.js --steering-only)
          echo "SHOULD_RUN=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "STEERING_DETECTED=$STEERING_DETECTED" >> "$GITHUB_OUTPUT"

      - name: 'Checkout fork code for build'
        if: "steps.detect.outputs.SHOULD_RUN == 'true'"
        uses: 'actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955' # ratchet:actions/checkout@v5
        with:
          ref: '${{ github.event.pull_request.head.sha }}'
          fetch-depth: 0
          persist-credentials: false

      - name: 'Set up Node.js'
        if: "steps.detect.outputs.SHOULD_RUN == 'true'"
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        if: "steps.detect.outputs.SHOULD_RUN == 'true'"
        run: 'npm ci'
        # Security: NO secrets in scope — postinstall hooks in fork's package.json
        # cannot exfiltrate GEMINI_API_KEY or GITHUB_TOKEN.

      - name: 'Build project'
        if: "steps.detect.outputs.SHOULD_RUN == 'true'"
        run: 'npm run build'
        # Security: NO secrets in scope — fork's build scripts cannot exfiltrate credentials.

      - name: 'Save PR metadata'
        if: "steps.detect.outputs.SHOULD_RUN == 'true'"
        run: |
          echo '${{ github.event.pull_request.number }}' > pr_number.txt
          echo '${{ steps.detect.outputs.STEERING_DETECTED }}' > steering_detected.txt
          echo '${{ github.event.pull_request.head.sha }}' > pr_head_sha.txt
          echo '${{ github.actor }}' > pr_actor.txt

      - name: 'Upload build artifacts'
        if: "steps.detect.outputs.SHOULD_RUN == 'true'"
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'eval-build-${{ github.event.pull_request.number }}'
          path: |
            bundle/
            evals/
            pr_number.txt
            steering_detected.txt
            pr_head_sha.txt
            pr_actor.txt
          retention-days: 1
