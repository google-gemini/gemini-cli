name: '📋 Gemini Scheduled Issue Triage'

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.event.number || github.run_id }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

permissions:
  id-token: 'write'
  issues: 'write'

jobs:
  triage-issues:
    timeout-minutes: 60
    if: |-
      ${{ github.repository == 'google-gemini/gemini-cli' }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          persist-credentials: false

      - name: 'Install Utilities'
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: 'Get Current Version'
        id: 'get_version'
        run: |
          VERSION=$(jq -r .version package.json | cut -d'-' -f1)
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "🚀 Current CLI Version: ${VERSION}"

      - name: 'Generate GitHub App Token'
        id: 'generate_token'
        uses: 'actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b' # ratchet:v2
        with:
          app-id: '${{ secrets.APP_ID }}'
          private-key: '${{ secrets.PRIVATE_KEY }}'
          permission-issues: 'write'

      - name: 'Get issue from event'
        if: |-
          ${{ github.event_name == 'issues' }}
        id: 'get_issue_from_event'
        env:
          ISSUE_EVENT: '${{ toJSON(github.event.issue) }}'
        run: |
          set -euo pipefail
          echo "$ISSUE_EVENT" | jq -c '[{number: .number, title: .title, body: .body}]' > issues_to_triage.json
          echo "has_issues=true" >> "${GITHUB_OUTPUT}"
          echo "✅ Found issue #${{ github.event.issue.number }} from event to triage! 🎯"

      - name: 'Sync Issue Types'
        if: |-
          ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ steps.generate_token.outputs.token }}'
          script: |-
            const syncIssueTypes = require('./.github/scripts/sync-issue-types.cjs');
            await syncIssueTypes({ github, context, core });

      - name: 'Find Issues with Conflicting Labels'
        if: |-
          ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: '${{ steps.generate_token.outputs.token }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail
          echo '🔍 Fetching open issues to find conflicts...'
          # Fetch up to 2000 open issues in one quick GraphQL-backed query
          gh issue list --repo "${GITHUB_REPOSITORY}" \
            --search "is:issue is:open" --limit 2000 \
            --json number,title,body,labels > all_open_issues.json

          echo '🧹 Filtering issues with multiple area/ or priority/ labels...'
          jq -c '[ .[] | select( (.labels | map(select(.name | startswith("area/"))) | length) > 1 or \
            (.labels | map(select(.name | startswith("priority/"))) | length) > 1 ) ] | .[0:50]' \
            all_open_issues.json > conflicting_labels_issues.json

          CONFLICT_COUNT=$(jq 'length' conflicting_labels_issues.json)
          echo "Found ${CONFLICT_COUNT} issues with conflicting labels (capped at 50 for processing)."

      - name: 'Find untriaged issues'
        if: |-
          ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        id: 'find_issues'
        env:
          GITHUB_TOKEN: '${{ steps.generate_token.outputs.token }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail

          QUERY_NO_AREA='is:open is:issue -label:area/core -label:area/agent -label:area/enterprise \
            -label:area/non-interactive -label:area/security -label:area/platform -label:area/extensions \
            -label:area/documentation -label:area/unknown'
          echo '🔍 Finding issues missing area labels...'
          gh issue list --repo "${GITHUB_REPOSITORY}" --search "${QUERY_NO_AREA}" \
            --limit 50 --json number,title,body,labels > no_area_issues.json

          QUERY_NO_KIND='is:open is:issue -label:kind/bug -label:kind/enhancement \
            -label:kind/customer-issue -label:kind/question'
          echo '🔍 Finding issues missing kind labels...'
          gh issue list --repo "${GITHUB_REPOSITORY}" --search "${QUERY_NO_KIND}" \
            --limit 50 --json number,title,body,labels > no_kind_issues.json

          QUERY_NO_PRIORITY='is:open is:issue -label:priority/p0 -label:priority/p1 -label:priority/p2 \
            -label:priority/p3 -label:priority/unknown'
          echo '🏷️ Finding issues missing priority labels...'
          gh issue list --repo "${GITHUB_REPOSITORY}" --search "${QUERY_NO_PRIORITY}" \
            --limit 50 --json number,title,body,labels > no_priority_issues.json

          QUERY_NO_EFFORT='is:open is:issue -label:effort/small -label:effort/medium -label:effort/large \
            label:area/core,area/extensions,area/site,area/non-interactive'
          echo '📏 Finding issues missing effort labels...'
          gh issue list --repo "${GITHUB_REPOSITORY}" --search "${QUERY_NO_EFFORT}" \
            --limit 20 --json number,title,body,labels > no_effort_issues.json

          echo '🔄 Merging and deduplicating standard triage issues...'
          if [ ! -f conflicting_labels_issues.json ]; then echo "[]" > conflicting_labels_issues.json; fi
          jq -c -s 'add | unique_by(.number)' no_area_issues.json no_kind_issues.json \
            no_priority_issues.json conflicting_labels_issues.json > standard_issues_to_triage.json

          echo '📏 Deduplicating effort issues...'
          jq -c -s 'add | unique_by(.number)' no_effort_issues.json > effort_issues_to_triage.json

          STANDARD_COUNT="$(jq 'length' standard_issues_to_triage.json)"
          EFFORT_COUNT="$(jq 'length' effort_issues_to_triage.json)"
          if [ "$STANDARD_COUNT" -gt 0 ] || [ "$EFFORT_COUNT" -gt 0 ]; then
            echo "has_issues=true" >> "${GITHUB_OUTPUT}"
            IS_STANDARD=$([ "$STANDARD_COUNT" -gt 0 ] && echo 'true' || echo 'false')
            IS_EFFORT=$([ "$EFFORT_COUNT" -gt 0 ] && echo 'true' || echo 'false')
            echo "has_standard_issues=${IS_STANDARD}" >> "${GITHUB_OUTPUT}"
            echo "has_effort_issues=${IS_EFFORT}" >> "${GITHUB_OUTPUT}"
          else
            echo "has_issues=false" >> "${GITHUB_OUTPUT}"
            echo "has_standard_issues=false" >> "${GITHUB_OUTPUT}"
            echo "has_effort_issues=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "✅ Found ${STANDARD_COUNT} standard issues and ${EFFORT_COUNT} effort issues to triage! 🎯"

      - name: 'Create Gemini CLI Experiments Override'
        if: |-
          steps.get_issue_from_event.outputs.has_issues == 'true' || \
          steps.find_issues.outputs.has_issues == 'true'
        run: |
          cat << 'EOF' > gemini_exp.json
          {
            "flags": [
              {
                "flagId": 45750526,
                "boolValue": false
              }
            ],
            "experimentIds": []
          }
          EOF

      - name: 'Get Repository Labels'
        id: 'get_labels'
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ steps.generate_token.outputs.token }}'
          script: |-
            const { data: labels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const labelNames = labels.map(label => label.name);
            core.setOutput('available_labels', labelNames.join(','));
            core.info(`Found ${labelNames.length} labels: ${labelNames.join(', ')}`);
            return labelNames;

      - name: 'Run Standard Triage Analysis'
        if: |-
          steps.get_issue_from_event.outputs.has_issues == 'true' || \
          steps.find_issues.outputs.has_standard_issues == 'true'
        uses: 'google-github-actions/run-gemini-cli@a3bf79042542528e91937b3a3a6fbc4967ee3c31' # ratchet:v0
        id: 'gemini_standard_issue_analysis'
        env:
          GITHUB_TOKEN: '' # Do not pass any auth token here since this runs on untrusted inputs
          REPOSITORY: '${{ github.repository }}'
          AVAILABLE_LABELS: '${{ steps.get_labels.outputs.available_labels }}'
          CLI_VERSION: '${{ steps.get_version.outputs.version }}'
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GEMINI_EXP: 'gemini_exp.json'
          GEMINI_STRICT_TELEMETRY_LIMITS: 'true'
          GEMINI_MODEL: 'gemini-3-flash-preview'
        with:
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          settings: |-
            {
              "maxSessionTurns": 25,
              "coreTools": [
                "run_shell_command(echo)",
                "read_file"
              ],
              "telemetry": {
                "enabled": false,
                "target": "gcp"
              }
            }
          prompt: |-
            ## Role

            You are an issue triage assistant. Analyze issues and identify
            appropriate labels. Use the available tools to gather information;
            do not ask for information to be provided.

            ## Steps

            1. You are only able to use the echo and read_file commands. Review the available labels in \
            the environment variable: "${AVAILABLE_LABELS}".
            2. Use the read_file tool to read the file "standard_issues_to_triage.json" which contains \
            the JSON array of issues to triage (including their current labels).
            3. Review the issue title, body, current labels, and any comments provided in the JSON file.
            4. Identify the most relevant labels specifically focusing on area/*, kind/*, and priority/*.
            5. Label Policy:
               - If the issue already has a kind/ label, do not change it.
               - If the issue has exactly ONE priority/ label, do not change it (unless you are \
                 explicitly re-evaluating an ambiguous priority).
               - If the issue is missing a priority/ label, OR if the issue currently has MULTIPLE \
                 priority/ labels, evaluate impact to determine exactly ONE priority level \
                 (p0-p3, or unknown). If fixing multiple labels, put the correct one in `labels_to_add` \
                 and others in `labels_to_remove`.
               - If the issue has exactly ONE area/ label, do not change it.
               - If missing an area/ label, OR if multiple area/ labels, select exactly ONE area/ label. \
                 If fixing multiple labels, put the correct one in `labels_to_add` and others in \
                 `labels_to_remove`.
            6. Identify other applicable labels based on issue content (status/*, help wanted, etc.).
            7. Give me a single short explanation about why you are selecting each label.
            8. Output a JSON array of objects, each containing issue number, labels to add/remove, \
               and explanation. For example:
               ```
               [
                 {
                   "issue_number": 123,
                   "labels_to_add": ["area/core", "kind/bug", "priority/p2"],
                   "labels_to_remove": ["status/need-triage"],
                   "explanation": "This issue is a UI bug that needs medium priority."
                 }
               ]
               ```
            9. Check if the CLI version is present (e.g., "• CLI Version: 0.33.1", "* **CLI Version:**").
              - **Only for bugs:** If version is provided but > 6 minor versions older than recent \
                release (current is ${{ steps.get_version.outputs.version }}), apply \
                status/need-information and ask to verify on latest version.
            10. **Only for bugs:** If insufficient info (e.g. missing repro steps or CLI version), \
                recommend status/need-information and ask for details. For features/enhancements, \
                CLI version is NOT required.
            11. For P0, apply priority/p1 AND status/manual-triage, and note it likely requires P0.
            12. If ambiguous or torn between P2 vs P3, retain existing priority if present.
            13. If uncertain, use area/unknown, kind/question, or priority/unknown. If extremely \
                uncertain, apply status/manual-triage.

            ## Guidelines

            - Output only valid JSON format. No extra text.
            - Only use labels that already exist in the repository.
            - Do not remove maintainer, help wanted or good first issue.
            - Identify exactly ONE area/ label and ONE priority/ label per issue.
            - **Do not manually downgrade priority.** System handles downgrades programmatically.
            - **NEVER mention label names in your `explanation`.** Write purely for the user.

            Categorization Guidelines (Priority):
            P0: DO NOT APPLY priority/p0. Use priority/p1 and status/manual-triage.
            P1: Severe issues without reasonable workaround, but not globally blocking.
            P2: Affect some workflows but a clear workaround exists, or non-critical bugs.
            P3: Trivial bugs, typos, documentation requests, or feature requests.

            Categorization Guidelines (Kind):
            kind/bug: Unexpected behavior or failure.
            kind/enhancement: Feature request or improvement.
            kind/question: Question about usage or features.

            Categorization Guidelines (Area):
            area/agent: Brain, logic, model quality, tool calling, memory, web search, sub-agents.
            area/core: Fundamental CLI app, UI/UX, installation, OS compatibility, performance.
            area/documentation: Website docs, READMEs, inline help.
            area/enterprise: Telemetry, Policy, Quota / Licensing.
            area/extensions: Extension capability.
            area/non-interactive: GitHub Actions, SDK, 3P Integrations, Shell Scripting.
            area/platform: Platform specific behavior.
            area/security: Auth, privacy, credential storage.

      - name: 'Stop Telemetry Collector'
        if: |-
          steps.find_issues.outputs.has_effort_issues == 'true'
        run: 'docker rm -f gemini-telemetry-collector || true'

      - name: 'Run Effort Triage Analysis'
        if: |-
          steps.find_issues.outputs.has_effort_issues == 'true'
        uses: 'google-github-actions/run-gemini-cli@a3bf79042542528e91937b3a3a6fbc4967ee3c31' # ratchet:v0
        id: 'gemini_effort_issue_analysis'
        env:
          GITHUB_TOKEN: '' # Do not pass any auth token here since this runs on untrusted inputs
          REPOSITORY: '${{ github.repository }}'
          AVAILABLE_LABELS: '${{ steps.get_labels.outputs.available_labels }}'
          CLI_VERSION: '${{ steps.get_version.outputs.version }}'
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GEMINI_EXP: 'gemini_exp.json'
          GEMINI_STRICT_TELEMETRY_LIMITS: 'true'
          GEMINI_MODEL: 'gemini-3-flash-preview'
        with:
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          settings: |-
            {
              "maxSessionTurns": 30,
              "coreTools": [
                "run_shell_command(echo)",
                "grep_search",
                "glob",
                "read_file"
              ],
              "telemetry": {
                "enabled": false,
                "target": "gcp"
              }
            }
          prompt: |-
            ## Role

            You are an expert software architect. Analyze the provided GitHub issues and \
            assign the correct `effort/*` label based on codebase complexity.

            ## Steps

            1. Use read_file to read "effort_issues_to_triage.json".
            2. For each issue, evaluate architectural complexity to determine effort. \
               MUST actively use search tools (grep_search, glob) to identify specific files.
            3. Output a JSON array of objects with issue_number, effort label, explanation, \
               and effort_analysis. Analysis must be highly detailed and cite specific file paths.

            Categorization Guidelines (Effort):
            effort/small: Trivial logic/config, UI adjustments, documentation, localized bug fixes.
            effort/medium: React/Ink state management, async flow & integration, cross-component refactors.
            effort/large: Platform-specific complexities (PTY/Signals), core architecture & protocols, \
              performance & memory leaks.

      - name: 'Apply Triaged Labels'
        if: |-
          always() && (
            (steps.gemini_standard_issue_analysis.outcome == 'success' && \
             steps.gemini_standard_issue_analysis.outputs.summary != '[]' && \
             steps.gemini_standard_issue_analysis.outputs.summary != '') ||
            (steps.gemini_effort_issue_analysis.outcome == 'success' && \
             steps.gemini_effort_issue_analysis.outputs.summary != '[]' && \
             steps.gemini_effort_issue_analysis.outputs.summary != '')
          )
        env:
          LABELS_OUTPUT_STANDARD: '${{ steps.gemini_standard_issue_analysis.outputs.summary }}'
          LABELS_OUTPUT_EFFORT: '${{ steps.gemini_effort_issue_analysis.outputs.summary }}'
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ steps.generate_token.outputs.token }}'
          script: |-
            const applyLabels = require('./.github/scripts/apply-issue-labels.cjs');
            await applyLabels({ github, context, core });

      - name: 'Sync Issue Types (Post-Analysis)'
        if: |-
          always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ steps.generate_token.outputs.token }}'
          script: |-
            const syncIssueTypes = require('./.github/scripts/sync-issue-types.cjs');
            await syncIssueTypes({ github, context, core });

      - name: 'Find Triaged Issues to Clean Up'
        if: |-
          always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          GITHUB_TOKEN: '${{ steps.generate_token.outputs.token }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail
          echo '🧹 Finding issues that have conflicting status labels...'
          gh issue list --repo "${GITHUB_REPOSITORY}" \
            --search 'is:open is:issue label:status/bot-triaged label:status/need-triage' \
            --limit 50 --json number > cleanup_1.json
          gh issue list --repo "${GITHUB_REPOSITORY}" \
            --search 'is:open is:issue label:status/bot-triaged label:status/manual-triage' \
            --limit 50 --json number > cleanup_2.json
          jq -c -s 'add | unique_by(.number)' cleanup_1.json cleanup_2.json > issues_to_cleanup.json

      - name: 'Clean Up Triage Labels'
        if: |-
          always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ steps.generate_token.outputs.token }}'
          script: |-
            const cleanupLabels = require('./.github/scripts/cleanup-triage-labels.cjs');
            await cleanupLabels({ github, context, core });
