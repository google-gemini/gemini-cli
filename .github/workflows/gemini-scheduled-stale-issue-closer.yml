name: '🔒 Gemini Scheduled Stale Issue Closer'

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no changes applied)'
        required: false
        default: false
        type: 'boolean'

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  close-stale-issues:
    if: "github.repository == 'google-gemini/gemini-cli'"
    runs-on: 'ubuntu-latest'
    permissions:
      issues: 'write'
    steps:
      - name: 'Generate GitHub App Token'
        id: 'generate_token'
        uses: 'actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ secrets.APP_ID }}'
          private-key: '${{ secrets.PRIVATE_KEY }}'
          permission-issues: 'write'

      - name: 'Process Stale Issues'
        uses: 'actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b' # ratchet:actions/github-script@v7
        env:
          DRY_RUN: '${{ inputs.dry_run }}'
        with:
          github-token: '${{ steps.generate_token.outputs.token }}'
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            if (dryRun) {
              core.info('DRY RUN MODE ENABLED: No changes will be applied.');
            }
            const batchLabel = 'Stale';

            const sixtyDaysAgo = new Date();
            sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);

            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

            core.info(`Cutoff date for creation: ${sixtyDaysAgo.toISOString()}`);
            core.info(`Cutoff date for updates: ${sevenDaysAgo.toISOString()}`);

            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open created:<${sixtyDaysAgo.toISOString()}`;
            core.info(`Searching with query: ${query}`);

            const itemsToCheck = await github.paginate(github.rest.search.issuesAndPullRequests, {
              q: query,
              sort: 'created',
              order: 'asc',
              per_page: 100
            });

            core.info(`Found ${itemsToCheck.length} open issues to check.`);

            let processedCount = 0;

            for (const issue of itemsToCheck) {
              const createdAt = new Date(issue.created_at);
              const updatedAt = new Date(issue.updated_at);
              const reactionCount = issue.reactions.total_count;

              // Basic thresholds
              if (reactionCount >= 5) {
                continue;
              }

              // Skip if it has a maintainer, help wanted, or Public Roadmap label
              const rawLabels = issue.labels.map((l) => l.name);
              const lowercaseLabels = rawLabels.map((l) => l.toLowerCase());
              if (
                lowercaseLabels.some((l) => l.includes('maintainer')) ||
                lowercaseLabels.includes('help wanted') ||
                rawLabels.includes('🗓️ Public Roadmap')
              ) {
                continue;
              }

              const hasStaleLabel = rawLabels.includes(batchLabel);
              let isStale = updatedAt < sevenDaysAgo;

              // If apparently active, check if it's only bot activity
              if (!isStale) {
                try {
                  const comments = await github.rest.issues.listComments({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    per_page: 100,
                    sort: 'created',
                    direction: 'desc'
                  });

                  const lastHumanComment = comments.data.find(comment => comment.user.type !== 'Bot');
                  if (lastHumanComment) {
                    isStale = new Date(lastHumanComment.created_at) < sevenDaysAgo;
                  } else {
                    // No human comments. Check if creator is human.
                    if (issue.user.type !== 'Bot') {
                       isStale = createdAt < sevenDaysAgo;
                    } else {
                       isStale = true; // Bot created, only bot comments
                    }
                  }
                } catch (error) {
                  core.warning(`Failed to fetch comments for issue #${issue.number}: ${error.message}`);
                  continue;
                }
              }

              if (isStale) {
                processedCount++;
                
                if (!hasStaleLabel) {
                  core.info(`Nudging stale issue #${issue.number}: "${issue.title}"`);
                  if (!dryRun) {
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      labels: [batchLabel]
                    });

                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: 'Hello! As part of our effort to keep our backlog manageable, we are tidying up older reports. It looks like this issue hasn\'t been active for a while. If there is no further activity, we will close this in 7 days. Thank you!'
                    });
                  }
                } else {
                  core.info(`Closing stale issue #${issue.number}: "${issue.title}"`);
                  if (!dryRun) {
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: 'Closing this issue due to continued inactivity. If you are still experiencing this bug on the latest stable build, please feel free to comment or create a new issue with updated details.'
                    });

                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      state: 'closed',
                      state_reason: 'not_planned'
                    });
                  }
                }
              }
            }

            core.info(`\nTotal issues processed: ${processedCount}`);
