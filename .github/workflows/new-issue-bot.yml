name: '🏷️ Triage & Diagnostic Bot'

on:
  issues:
    types:
      - 'opened'  # Triggers automatically when a new issue is created
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to manually trigger on'
        required: false
        type: 'string'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.issue.number || github.event.inputs.issue_number }}'
  cancel-in-progress: true

permissions:
  contents: 'read'      # Access to read repository files
  issues: 'write'        # Access to post comments on issues

jobs:
  triage:
    name: 'Triage & Diagnosis'
    runs-on: 'ubuntu-latest'
    if: "github.repository == 'chadd28/gemini-cli'" # Safety check: only run on your fork
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v5'
        with:
          persist-credentials: false

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Build Gemini CLI'
        run: 'npm run bundle'

      - name: 'Prepare Issue Context'
        id: 'prepare_context'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ github.event.issue.number || github.event.inputs.issue_number }}'
        run: |
          set -euo pipefail
          echo "<untrusted_context>" > trigger_context.md
          echo "# New Issue opened by contributor" >> trigger_context.md
          
          # Fetch the live issue title and body using the gh CLI
          gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" >> trigger_context.md
          
          echo "</untrusted_context>" >> trigger_context.md
          
          # Combine the context with the triage instructions
          cat trigger_context.md tools/new-issue-bot/brain/triage_orchestrator.md > combined_prompt.md

      - name: 'Run Triage Agent'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          GEMINI_MODEL: 'gemini-2.5-flash'
          GEMINI_CLI_HOME: 'tools/new-issue-bot'
        run: |
          node bundle/gemini.js --policy tools/new-issue-bot/policy.toml --prompt="$(cat combined_prompt.md)"

      - name: 'Post Triage Reply'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ github.event.issue.number || github.event.inputs.issue_number }}'
        run: |
          if [ -s "issue-comment.md" ]; then
            echo "Posting diagnosis comment to issue #$ISSUE_NUMBER..."
            gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" -F body=@"issue-comment.md"
          else
            echo "No comment generated by the agent."
          fi
