# Triage Worker Security Policy
#
# To ensure safety and prevent accidental or malicious side effects (such as 
# prompt injection attacks from issue bodies), this policy enforces strict 
# read-only access.

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "list_dir"
decision = "allow"
priority = 100

[[rule]]
toolName = "find_by_name"
decision = "allow"
priority = 100

[[rule]]
toolName = "grep_search"
decision = "allow"
priority = 100

[[rule]]
toolName = "activate_skill"
decision = "allow"
priority = 100

[[rule]]
toolName = "*"
decision = "deny"
priority = 10