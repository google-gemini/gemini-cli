    <text x="45" y="53" fill="#ffffff" textLength="153" lengthAdjust="spacingAndGlyphs" font-weight="bold">run_shell_command</text>
    <text x="207" y="53" fill="#6c7086" textLength="486" lengthAdjust="spacingAndGlyphs">cat &lt;&lt; &apos;EOF&apos; &gt; foo.txtRoses are red,Violets are blue,T</text>
    <text x="693" y="53" fill="#ffffff" textLength="18" lengthAdjust="spacingAndGlyphs">… </text>
