    <text x="0" y="138" fill="#f9e2af" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="18" y="138" fill="#ffffff" textLength="54" lengthAdjust="spacingAndGlyphs" font-weight="bold">Note: </text>
    <text x="72" y="138" fill="#ffffff" textLength="639" lengthAdjust="spacingAndGlyphs">Command contains redirection which can be undesirable.                 </text>
