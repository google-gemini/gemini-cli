    <text x="0" y="87" fill="#f9e2af" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="18" y="87" fill="#6c7086" textLength="225" lengthAdjust="spacingAndGlyphs">... 7 hidden (Ctrl+O) ...</text>
