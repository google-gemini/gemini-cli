    <text x="0" y="240" fill="#f9e2af" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="9" y="240" fill="#ffffff" textLength="702" lengthAdjust="spacingAndGlyphs">   3. No, suggest changes (esc)                                               </text>
    <text x="711" y="240" fill="#f9e2af" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="257" fill="#f9e2af" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="711" y="257" fill="#f9e2af" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="274" fill="#f9e2af" textLength="720" lengthAdjust="spacingAndGlyphs">╰──────────────────────────────────────────────────────────────────────────────╯</text>
    <text x="9" y="291" fill="#cba6f7" textLength="279" lengthAdjust="spacingAndGlyphs">Press Ctrl+O to show more lines</text>
