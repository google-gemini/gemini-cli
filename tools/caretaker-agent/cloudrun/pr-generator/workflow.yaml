# Google Cloud Workflow that triggers Cloud Run Job and updates Firestore on failure.

main:
  params: [event]
  steps:
    - init:
        assign:
          - project_id: 'gcli-intern-project-2026'
          - database_id: '(default)'
          - collection_name: 'issues'
          - job_name: "pr-gen-job" # The Cloud Run Job name
          - job_location: "us-central1"
          - repo_url: "https://github.com/joneba-google/gemini-cli-clone"
          - workflow_execution_id: '${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}'
          
          # Decode Pub/Sub message
          - pubsub_message_bytes: '${base64.decode(event.data.message.data)}'
          - firestore_doc_str: '${text.decode(pubsub_message_bytes)}'
          - firestore_doc: '${json.decode(firestore_doc_str)}'
          - status: "STARTED"
          - error_details: null

    - check_firestore_id:
        switch:
          - condition: '${"firestore_id" in firestore_doc}'
            next: assign_explicit_doc_id
        next: assign_derived_doc_id

    - assign_explicit_doc_id:
        assign:
          - doc_id: '${firestore_doc.firestore_id}'
        next: get_github_token

    - assign_derived_doc_id:
        assign:
          - doc_id: '${"github_" + firestore_doc.github_metadata.owner + "_" + firestore_doc.github_metadata.repo + "_" + string(firestore_doc.github_metadata.issue_number)}'
        next: get_github_token

    - get_github_token:
        call: googleapis.secretmanager.v1.projects.secrets.versions.access
        args:
          name: '${"projects/" + project_id + "/secrets/PR_GEN_GITHUB_PUSH_KEY/versions/latest"}'
        result: secret_response

    - decode_github_token:
        assign:
          - git_token: '${text.decode(base64.decode(secret_response.payload.data))}'

    - run_job:
        try:
          call: googleapis.run.v1.namespaces.jobs.run
          args:
            name: '${"namespaces/" + project_id + "/jobs/" + job_name}'
            location: '${job_location}'
            body:
              overrides:
                containerOverrides:
                  - env:
                      - name: "FIRESTORE_DOC"
                        value: '${firestore_doc_str}'
                      - name: "REPO_URL"
                        value: '${repo_url}'
                      - name: "USE_ADC"
                        value: "true"
                      - name: "GIT_TOKEN"
                        value: '${git_token}'
                      - name: "EXECUTION_ID"
                        value: '${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}'
                      - name: "GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID"
                        value: '${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}'
            connector_params:
              timeout: 3600
          result: job_result
        except:
          as: e
          steps:
            - handle_job_error:
                assign:
                  - status: "NEEDS_HUMAN"
                  - error_details: '${e}'
            - update_firestore_on_failure:
                try:
                  call: googleapis.firestore.v1.projects.databases.documents.patch
                  args:
                    name: '${"projects/" + project_id + "/databases/" + database_id + "/documents/" + collection_name + "/" + doc_id}'
                    updateMask:
                      fieldPaths:
                        - "status"
                        - "failure_error"
                        - "lock.holder"
                        - "lock.expires_at"
                    body:
                      fields:
                        status:
                          stringValue: "NEEDS_HUMAN"
                        failure_error:
                          stringValue: '${"Workflow Execution " + sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID") + " failed: " + json.encode_to_string(error_details)}'
                        lock:
                          mapValue:
                            fields:
                              holder:
                                nullValue: "NULL_VALUE"
                              expires_at:
                                nullValue: "NULL_VALUE"
                except:
                  as: fs_err
                  steps:
                    - log_firestore_error:
                        assign:
                          - firestore_error: '${fs_err}'
                next: handle_failure
        next: mark_completed

    - handle_failure:
        return: '${"Failed: " + json.encode_to_string(error_details)}'

    - mark_completed:
        assign:
          - status: "COMPLETED"
        next: finish

    - finish:
        return: '${status}'
